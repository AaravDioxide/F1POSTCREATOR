<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Pro Studio v5.4 – Extreme Customization</title>
<style>
  :root {
    --bg-dark: #0b0e14;
    --bg-panel: #161b22;
    --accent: #e10600;
    --text: #f0f6fc;
    --border: #30363d;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0; background: var(--bg-dark); color: var(--text);
    font-family: var(--font-ui); height: 100vh; overflow: hidden;
    display: flex;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  /* SIDEBAR GRID */
  .sidebar {
    width: 460px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100%;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .tab-header { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-panel); z-index: 10; }
  .tab-btn {
    flex: 1; padding: 15px; background: transparent; border: none;
    color: #8b949e; cursor: pointer; font-weight: 600;
    transition: 0.3s ease; border-bottom: 2px solid transparent;
  }
  .tab-btn:hover { color: #c9d1d9; background: rgba(255,255,255,0.01); }
  .tab-btn.active { color: white; border-bottom-color: var(--accent); background: rgba(255,255,255,0.03); }

  .tab-content { padding: 20px; display: none; animation: fadeIn 0.3s ease; }
  .tab-content.active { display: block; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* CONTROLS */
  .control-group { margin-bottom: 20px; border-bottom: 1px solid #21262d; padding-bottom: 15px; }
  .control-group:last-child { border-bottom: none; }
  
  label { display: block; font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
  
  input[type="text"], input[type="number"], select {
    width: 100%; background: #0d1117; border: 1px solid var(--border);
    color: white; padding: 10px; border-radius: 6px; font-size: 13px;
    margin-bottom: 5px; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(225, 6, 0, 0.2); }
  
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  /* GRID EDITOR STYLE */
  .grid-row { display: grid; grid-template-columns: 25px 1fr 80px 45px; gap: 8px; margin-bottom: 8px; align-items: center; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 6px;}
  .grid-pos { font-size: 12px; font-weight: bold; color: #8b949e; text-align: center; }
  
  .move-controls { display: flex; gap: 2px; }
  .move-btn { background: #21262d; border: 1px solid var(--border); color: #8b949e; border-radius: 4px; cursor: pointer; padding: 4px; font-size: 10px; transition: 0.2s; flex: 1;}
  .move-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .move-btn:disabled { opacity: 0.3; cursor: not-allowed; background: #21262d; border-color: var(--border); color: #8b949e;}

  /* DRIVER ASSETS */
  .asset-uploader {
    display: flex; align-items: center; gap: 15px;
    background: rgba(255,255,255,0.03); padding: 12px; border-radius: 6px; margin-bottom: 10px;
    border: 1px dashed var(--border); transition: 0.2s;
  }
  .asset-uploader:hover { border-color: #8b949e; }
  .asset-preview {
    width: 45px; height: 45px; background: #000; border-radius: 6px; object-fit: cover; border: 1px solid var(--border);
  }

  /* PREVIEW AREA */
  .main-stage {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0d1117; padding: 40px;
    position: relative;
    background-image: radial-gradient(#1f242e 1px, transparent 1px);
    background-size: 20px 20px;
    overflow: hidden;
  }

  canvas {
    max-height: 90vh; max-width: 100%;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
    border: 1px solid #30363d;
    border-radius: 4px;
    transition: width 0.3s, height 0.3s;
  }

  .btn-primary {
    background: var(--accent); color: white; font-weight: bold; font-size: 14px;
    padding: 14px; border: none; border-radius: 6px; cursor: pointer; width: 100%;
    margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 12px rgba(225, 6, 0, 0.3);
  }
  .btn-secondary {
    background: #21262d; color: white; font-weight: bold;
    padding: 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; flex:1; transition: 0.2s;
  }
  .btn-fun {
    background: #6A0DAD; color: white; font-weight: bold;
    padding: 10px; border: none; border-radius: 6px; cursor: pointer; flex:1; transition: 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 15px rgba(225, 6, 0, 0.4); }
  .btn-secondary:hover { background: #30363d; }
  .btn-fun:hover { background: #8e24aa; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(106, 13, 173, 0.4);}

  /* Checkbox & Slider */
  input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer; margin-top: -6px; box-shadow: 0 0 5px rgba(0,0,0,0.5);
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%; height: 4px; cursor: pointer; background: #30363d; border-radius: 2px;
  }
  
  .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; padding: 4px 0;}
  .checkbox-row input { width: auto; margin: 0; cursor: pointer; }
  .checkbox-row span { font-size: 13px; user-select: none; }

  /* MOBILE RESPONSIVE TWEAKS */
  @media (max-width: 768px) {
    body {
      flex-direction: column-reverse; /* Puts preview on top, controls on bottom */
    }
    .sidebar {
      width: 100%;
      height: 55vh;
      border-right: none;
      border-top: 1px solid var(--border);
    }
    .main-stage {
      height: 45vh;
      padding: 15px;
      flex: none;
    }
    canvas {
      max-height: 100%;
      max-width: 100%;
    }
    .grid-row {
      grid-template-columns: 20px 1fr 60px 45px; /* Adjust grid columns to prevent horizontal overflow */
    }
    .tab-btn {
      padding: 12px 5px;
      font-size: 13px;
    }
  }

</style>
</head>
<body>

  <div class="sidebar">
    <div class="tab-header">
      <button class="tab-btn active" onclick="switchTab('data')">1. Data</button>
      <button class="tab-btn" onclick="switchTab('assets')">2. Assets</button>
      <button class="tab-btn" onclick="switchTab('design')">3. Design</button>
    </div>

    <div id="tab-data" class="tab-content active">
      <div class="control-group">
        <label>Graphic Mode</label>
        <select id="layoutMode" onchange="updateState('layout', this.value)">
          <option value="list">Grid Results (List/Columns)</option>
          <option value="gridMap">Starting Grid (Visual Map)</option>
          <option value="podium">Podium Celebration</option>
          <option value="hero">Hero / Pole Position</option>
        </select>
      </div>

      <div class="control-group">
        <label>Headlines</label>
        <input type="text" id="titleInput" value="MONACO GP" placeholder="Main Title" oninput="updateState('title', this.value)">
        <input type="text" id="subInput" value="STARTING GRID" placeholder="Subtitle" oninput="updateState('subtitle', this.value)">
      </div>

      <div class="control-group" id="heroDataControls" style="display:none; padding:15px; background:#1c2128; border-radius:6px; border-left:4px solid var(--accent);">
        <label style="color:white">Hero Driver Details</label>
        <select id="heroDriverSelect" onchange="updateHeroDriver(this.value)" style="margin-bottom:10px;"></select>
        <input type="text" id="heroText" value="POLE POSITION" placeholder="Big Text (e.g. POLE)" oninput="updateState('heroText', this.value)">
      </div>

      <div class="control-group" id="gridControlGroup">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <label style="margin:0">Grid (Pos | Driver | Time | Move)</label>
            <span id="driverCountDisplay" style="font-size:11px; font-weight:bold; color:var(--accent); background:rgba(225,6,0,0.1); padding:2px 8px; border-radius:10px;">20</span>
        </div>
        
        <div class="row" style="margin-bottom:15px;">
            <button class="btn-secondary" onclick="adjustGridSize(1)">+ Add</button>
            <button class="btn-secondary" onclick="adjustGridSize(-1)">- Remove</button>
            <button class="btn-fun" onclick="randomizeGrid()" title="Randomly shuffle the entire grid!">🎲 Shuffle</button>
        </div>

        <div id="grid-inputs"></div>
      </div>
    </div>

    <div id="tab-assets" class="tab-content">
      <div class="control-group">
        <label>Global Background Image</label>
        <input type="file" onchange="handleImageUpload('bg', this)" accept="image/*" style="font-size: 11px;">
      </div>

      <div class="control-group">
        <label>Brand / League Watermark (Top Right)</label>
        <input type="file" onchange="handleImageUpload('watermark', this)" accept="image/*" style="font-size: 11px;">
      </div>

      <div class="control-group">
        <label>Driver Images (Transparent PNGs ideally)</label>
        
        <div class="asset-uploader">
          <img id="prev-p1" class="asset-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
          <div style="flex:1">
            <label style="color: white;">P1 / Hero Driver</label>
            <input type="file" onchange="handleImageUpload('p1', this)" accept="image/*" style="border:none; padding:0; background:transparent;">
          </div>
        </div>

        <div class="asset-uploader">
          <img id="prev-p2" class="asset-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
          <div style="flex:1">
            <label style="color: white;">P2 Driver</label>
            <input type="file" onchange="handleImageUpload('p2', this)" accept="image/*" style="border:none; padding:0; background:transparent;">
          </div>
        </div>

        <div class="asset-uploader">
          <img id="prev-p3" class="asset-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
          <div style="flex:1">
            <label style="color: white;">P3 Driver</label>
            <input type="file" onchange="handleImageUpload('p3', this)" accept="image/*" style="border:none; padding:0; background:transparent;">
          </div>
        </div>
      </div>
    </div>

    <div id="tab-design" class="tab-content">
      
      <div class="control-group">
        <label>Theme Colors</label>
        <div class="row">
          <div style="display:flex; flex-direction:column; gap:5px; flex:1">
             <span style="font-size:10px; color:#8b949e">Accent</span>
             <input type="color" value="#e10600" oninput="updateState('accentColor', this.value)" style="width:100%; height:40px; cursor:pointer;">
          </div>
          <div style="display:flex; flex-direction:column; gap:5px; flex:1">
             <span style="font-size:10px; color:#8b949e">Background</span>
             <input type="color" value="#0b0e14" oninput="updateState('bgColor', this.value)" style="width:100%; height:40px; cursor:pointer;">
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Typography</label>
        <select onchange="updateState('fontFamily', this.value)">
          <option value="'Segoe UI', system-ui, sans-serif">Modern F1 (System Clean)</option>
          <option value="'Impact', sans-serif">Aggressive (Heavy Racing)</option>
          <option value="'Courier New', monospace">Telemetry (Tech/Digital)</option>
          <option value="'Times New Roman', serif">Prestige (Classic/Monaco)</option>
        </select>
        <label class="checkbox-row" style="margin-top: 8px;">
            <input type="checkbox" onchange="updateState('textGlow', this.checked)">
            <span>Neon Glow Headlines (Uses Accent Color)</span>
        </label>
      </div>

      <div class="control-group">
        <label>Advanced Style & Overlay</label>
        <label class="checkbox-row">
            <input type="checkbox" onchange="updateState('useTexture', this.checked)">
            <span>Add Broadcast Grain/Texture</span>
        </label>
        <label class="checkbox-row">
            <input type="checkbox" onchange="updateState('glassMode', this.checked)">
            <span>Glassmorphism (Modern Blur/Glow)</span>
        </label>
         <label class="checkbox-row">
            <input type="checkbox" onchange="updateState('italicFont', this.checked)">
            <span>Italicized Fonts (Speed effect)</span>
        </label>
        <label class="checkbox-row">
            <input type="checkbox" checked onchange="updateState('autoCols', this.checked)">
            <span>Auto Split Columns (>10 drivers)</span>
        </label>
      </div>

      <div class="control-group" style="background:#1c2128; padding:12px; border-radius:6px; border:1px dashed #6A0DAD;">
        <label style="color:#c9d1d9;">🎬 Special FX & Weather</label>
        <label class="checkbox-row">
            <input type="checkbox" onchange="updateState('fxRain', this.checked)">
            <span>Heavy Rain Drops (Wet Race)</span>
        </label>
        <label class="checkbox-row">
            <input type="checkbox" onchange="updateState('fxSpeedLines', this.checked)">
            <span>Anime Speed Lines (Velocity)</span>
        </label>
      </div>

      <div class="control-group">
        <label>Podium Fitting Controls</label>
        <p style="font-size:11px; color:#8b949e; margin-bottom:10px;">Only affects "Podium" Mode image sizing.</p>
        
        <div class="row" style="align-items:center; margin-bottom:10px;">
            <span style="font-size:11px; font-weight:bold; width:50px;">Zoom</span>
            <input type="range" min="50" max="200" value="100" oninput="updateState('podiumScale', parseInt(this.value))">
        </div>
        <div class="row" style="align-items:center; margin-bottom:10px;">
            <span style="font-size:11px; font-weight:bold; width:50px;">Y-Offset</span>
            <input type="range" min="-200" max="200" value="0" oninput="updateState('podiumOffsetY', parseInt(this.value))">
        </div>
         <label class="checkbox-row" style="margin-top:5px;">
            <input type="checkbox" checked onchange="updateState('podiumClip', this.checked)">
            <span>Clip Image to Box (Behind Text)</span>
        </label>
      </div>

      <div class="control-group">
        <label>Global Positioning</label>
        <div class="row" style="align-items:center; margin-bottom: 10px;">
          <span style="font-size:11px; font-weight:bold; width:50px;">Title Y</span>
          <input type="range" min="-100" max="100" value="0" oninput="updateState('offsetTitle', parseInt(this.value))">
        </div>
        <div class="row" style="align-items:center;">
          <span style="font-size:11px; font-weight:bold; width:50px;">List Y</span>
          <input type="range" min="-200" max="200" value="0" oninput="updateState('offsetContent', parseInt(this.value))">
        </div>
      </div>

      <div class="control-group">
        <label>Canvas Output Size</label>
        <select onchange="updateState('aspect', this.value)">
          <option value="portrait">Portrait (4:5) - IG/FB Post</option>
          <option value="story">Story (9:16) - TikTok/Reels/Story</option>
          <option value="square">Square (1:1) - Standard Social</option>
          <option value="landscape">Landscape (16:9) - YouTube/TV</option>
        </select>
      </div>

      <button class="btn-primary" onclick="downloadImage()">⬇ Download High Res Canvas</button>
    </div>
  </div>

  <div class="main-stage">
    <canvas id="canvas"></canvas>
  </div>

<script>
/* -------------------------------------------------------------------------- */
/* DATABASE                                                                   */
/* -------------------------------------------------------------------------- */
const DRIVERS = [
  { id: 1, name: "Lando Norris", team: "McLaren", color: "#FF8000" },
  { id: 3, name: "Max Verstappen", team: "Red Bull", color: "#0600EF" },
  { id: 81, name: "Oscar Piastri", team: "McLaren", color: "#FF8000" },
  { id: 16, name: "Charles Leclerc", team: "Ferrari", color: "#E80020" },
  { id: 44, name: "Lewis Hamilton", team: "Ferrari", color: "#E80020" },
  { id: 63, name: "George Russell", team: "Mercedes", color: "#00D2BE" },
  { id: 12, name: "Kimi Antonelli", team: "Mercedes", color: "#00D2BE" },
  { id: 20, name: "Isack Hadjar", team: "Red Bull", color: "#0600EF" },
  { id: 55, name: "Carlos Sainz", team: "Williams", color: "#005AFF" },
  { id: 23, name: "Alex Albon", team: "Williams", color: "#005AFF" },
  { id: 14, name: "Fernando Alonso", team: "Aston Martin", color: "#006F62" },
  { id: 18, name: "Lance Stroll", team: "Aston Martin", color: "#006F62" },
  { id: 10, name: "Pierre Gasly", team: "Alpine", color: "#FD4BC7" },
  { id: 43, name: "Franco Colapinto", team: "Alpine", color: "#FD4BC7" },
  { id: 30, name: "Liam Lawson", team: "RB", color: "#6692FF" },
  { id: 41, name: "Arvid Lindblad", team: "RB", color: "#6692FF" },
  { id: 27, name: "Nico Hulkenberg", team: "Sauber", color: "#52E252" },
  { id: 5, name: "Gabriel Bortoleto", team: "Sauber", color: "#52E252" },
  { id: 31, name: "Esteban Ocon", team: "Haas", color: "#B6BABD" },
  { id: 87, name: "Oliver Bearman", team: "Haas", color: "#B6BABD" },
  { id: 89, name: "Aidan Jackson", team: "Konnersport", color: "#6A0DAD" },
  { id: 99, name: "Joe Packere", team: "Konnersport", color: "#6A0DAD" },
  { id: 9, name: "Joshua Pearce", team: "APXGP", color: "#D4AF37" },
  { id: 42, name: "Luca Cortez", team: "APXGP", color: "#D4AF37" },
  { id: 77, name: "Valtteri Bottas", team: "Cadillac", color: "#FFFFFF" },
  { id: 11, name: "Sergio Perez", team: "Cadillac", color: "#FFFFFF" },
  // Generic Team Blocks
  { id: 300, name: "Mercedes", team: "Mercedes", color: "#00D2BE" },
  { id: 400, name: "Red Bull", team: "Red Bull", color: "#0600EF" },
  { id: 500, name: "Ferrari", team: "Ferrari", color: "#DC0000" },
  { id: 100, name: "McLaren", team: "McLaren", color: "#FF8700" },
  { id: 800, name: "Aston Martin", team: "Aston Martin", color: "#006F62" },
  { id: 1100, name: "Alpine", team: "Alpine", color: "#0090FF" },
  { id: 600, name: "Williams", team: "Williams", color: "#005AFF" },
  { id: 900, name: "Haas", team: "Haas", color: "#B6BABD" },
  { id: 700, name: "Racing Bulls", team: "Racing Bulls", color: "#2B5EFF" },
  { id: 1000, name: "Audi", team: "Audi", color: "#000000" },
  { id: 1200, name: "Cadillac", team: "Cadillac", color: "#0033A0" },
  { id: 1300, name: "DUOTONE F1", team: "DUOTONE F1", color: "#6A0DAD" },
  { id: 200, name: "APXGP", team: "APXGP", color: "#D4AF37" }
];

/* -------------------------------------------------------------------------- */
/* STATE ENGINE                                                               */
/* -------------------------------------------------------------------------- */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const state = {
  layout: 'list', 
  title: 'MONACO GP',
  subtitle: 'STARTING GRID',
  heroText: 'POLE POSITION',
  aspect: 'portrait',
  
  // Design
  bgColor: '#0b0e14',
  accentColor: '#e10600',
  offsetTitle: 0,
  offsetContent: 0,
  
  // Typography & Aesthetics (NEW)
  fontFamily: "'Segoe UI', system-ui, sans-serif",
  textGlow: false,
  
  // Advanced Styles
  useTexture: false,
  glassMode: false,
  italicFont: false,
  autoCols: true, 

  // FX (NEW)
  fxRain: false,
  fxSpeedLines: false,
  
  // Podium Fitting
  podiumScale: 100,
  podiumOffsetY: 0,
  podiumClip: true,

  // Data
  grid: [],
  heroDriver: DRIVERS[0],
  
  // Assets (Added watermark)
  assets: { bg: null, p1: null, p2: null, p3: null, watermark: null }
};

// Initialize Grid Data with 20 Drivers
state.grid = Array(20).fill(null).map((_, i) => ({
  pos: i + 1,
  ...DRIVERS[i % DRIVERS.length],
  gap: i === 0 ? "POLE" : `+${(Math.random() * i).toFixed(3)}s`
}));

/* -------------------------------------------------------------------------- */
/* CORE LOGIC                                                                 */
/* -------------------------------------------------------------------------- */

function init() {
  buildInputs();
  render();
}

function updateState(key, value) {
  state[key] = value;
  
  if(key === 'layout') {
    document.getElementById('heroDataControls').style.display = value === 'hero' ? 'block' : 'none';
    document.getElementById('gridControlGroup').style.display = value === 'hero' ? 'none' : 'block';
  }
  
  requestAnimationFrame(render);
}

function adjustGridSize(change) {
    const currentLen = state.grid.length;
    const newLen = currentLen + change;

    if(newLen < 1 || newLen > 1000) return;

    if(change > 0) {
        const i = currentLen;
        state.grid.push({
            pos: i + 1,
            ...DRIVERS[i % DRIVERS.length],
            gap: `+${(Math.random() * i).toFixed(3)}s`
        });
    } else {
        state.grid.pop();
    }
    
    buildInputs();
    render();
}

// NEW FUNCTION: Randomize Grid
function randomizeGrid() {
    // Fisher-Yates Shuffle
    for (let i = state.grid.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [state.grid[i], state.grid[j]] = [state.grid[j], state.grid[i]];
    }
    
    // Fix positioning numbers and gaps logically after shuffle
    state.grid.forEach((d, i) => {
        d.pos = i + 1;
        if(i === 0) d.gap = "POLE";
        else if (d.gap === "POLE") d.gap = `+${(Math.random() * 2).toFixed(3)}s`; // Ensure old pole gets a time
    });
    
    buildInputs();
    render();
}

function updateGridData(index, key, value) {
    if(key === 'id') {
        const drv = DRIVERS.find(x => x.id == value);
        state.grid[index] = { ...state.grid[index], ...drv };
    } else {
        state.grid[index][key] = value;
    }
    render();
}

function moveDriver(index, direction) {
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= state.grid.length) return;
    
    // Swap the elements
    const temp = state.grid[index];
    state.grid[index] = state.grid[newIndex];
    state.grid[newIndex] = temp;
    
    // Fix POS numbering logically
    state.grid[index].pos = index + 1;
    state.grid[newIndex].pos = newIndex + 1;
    
    buildInputs();
    render();
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  event.target.classList.add('active');
}

function handleImageUpload(key, input) {
  const file = input.files[0];
  if(!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      state.assets[key] = img;
      render();
    };
    img.src = e.target.result;
    if(document.getElementById(`prev-${key}`)) {
      document.getElementById(`prev-${key}`).src = e.target.result;
    }
  };
  reader.readAsDataURL(file);
}

function buildInputs() {
  const container = document.getElementById('grid-inputs');
  container.innerHTML = '';
  document.getElementById('driverCountDisplay').innerText = `${state.grid.length} Drivers`;
  
  state.grid.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'grid-row';
    
    // Position
    const pos = document.createElement('span');
    pos.className = 'grid-pos';
    pos.innerText = d.pos;
    
    // Driver Select
    const sel = document.createElement('select');
    DRIVERS.forEach(drv => {
      const opt = document.createElement('option');
      opt.value = drv.id;
      opt.text = drv.name;
      if(drv.id === d.id) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = (e) => updateGridData(i, 'id', e.target.value);
    
    // Gap Input
    const gapInput = document.createElement('input');
    gapInput.type = 'text';
    gapInput.value = d.gap;
    gapInput.oninput = (e) => updateGridData(i, 'gap', e.target.value);
    
    // Move Controls (Up/Down)
    const moveGrp = document.createElement('div');
    moveGrp.className = 'move-controls';
    
    const upBtn = document.createElement('button');
    upBtn.className = 'move-btn';
    upBtn.innerText = '↑';
    upBtn.onclick = () => moveDriver(i, -1);
    upBtn.disabled = i === 0;

    const downBtn = document.createElement('button');
    downBtn.className = 'move-btn';
    downBtn.innerText = '↓';
    downBtn.onclick = () => moveDriver(i, 1);
    downBtn.disabled = i === state.grid.length - 1;

    moveGrp.append(upBtn, downBtn);

    div.append(pos, sel, gapInput, moveGrp);
    container.appendChild(div);
  });

  // Hero select
  const heroSel = document.getElementById('heroDriverSelect');
  heroSel.innerHTML = ''; 
  DRIVERS.forEach(drv => {
    const opt = document.createElement('option');
    opt.value = drv.id;
    opt.text = drv.name;
    if(drv.id === state.heroDriver.id) opt.selected = true;
    heroSel.appendChild(opt);
  });
}

function updateHeroDriver(id) {
  state.heroDriver = DRIVERS.find(d => d.id == id);
  render();
}

/* -------------------------------------------------------------------------- */
/* RENDERING ENGINE (WITH NEW FX AND CUSTOMIZATION)                           */
/* -------------------------------------------------------------------------- */

// Utility for rounded rectangles
function roundRect(ctx, x, y, width, height, radius) {
  if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, radius);
      ctx.fill();
      return;
  }
  // Fallback
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
  ctx.fill();
}

function getDimensions() {
  const baseW = 1080;
  let baseH = 1350; // portrait
  if(state.aspect === 'square') baseH = 1080;
  if(state.aspect === 'story') baseH = 1920;
  if(state.aspect === 'landscape') baseH = 608;
  return { w: baseW, h: baseH };
}

// Updated getFont to support Dynamic Font Selection
function getFont(weight, size) {
    const style = state.italicFont ? 'italic' : 'normal';
    return `${style} ${weight} ${size}px ${state.fontFamily}`;
}

// FX Engine Functions
function drawSpeedLines(w, h) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
    // Pseudo-random generation based on static seed to avoid extreme flickering
    for(let i=0; i<80; i++) {
        let y = (Math.sin(i * 123.45) * 0.5 + 0.5) * h;
        let width = 50 + (Math.cos(i * 321.12) * 0.5 + 0.5) * 300;
        let x = (i % 2 === 0) ? 0 : w - width; // left or right edge
        ctx.fillRect(x, y, width, 1 + (i % 4));
    }
}

function drawRain(w, h) {
    ctx.strokeStyle = 'rgba(200, 220, 255, 0.25)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let i=0; i<300; i++) {
        // distribute pseudo-randomly
        let x = (Math.sin(i * 99.99) * 0.5 + 0.5) * w;
        let y = (Math.cos(i * 88.88) * 0.5 + 0.5) * h;
        let len = 30 + (i % 30);
        ctx.moveTo(x, y);
        // angled slightly right
        ctx.lineTo(x - len/3, y + len); 
    }
    ctx.stroke();
}

function render() {
  const dim = getDimensions();
  canvas.width = dim.w;
  canvas.height = dim.h;
  const w = dim.w;
  const h = dim.h;
  
  // 1. Background
  if(state.assets.bg) {
    const img = state.assets.bg;
    const r = Math.max(w / img.width, h / img.height);
    const nw = img.width * r;
    const nh = img.height * r;
    ctx.drawImage(img, (w-nw)/2, (h-nh)/2, nw, nh);
    
    ctx.fillStyle = `rgba(0,0,0,0.65)`;
    ctx.fillRect(0,0,w,h);
  } else {
    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0, state.bgColor);
    g.addColorStop(1, '#000000');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);
  }

  // FX: Speed Lines Background
  if(state.fxSpeedLines) drawSpeedLines(w, h);

  // Vignette Effect for depth
  const vignette = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.9);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0,0,w,h);

  // Texture Overlay
  if(state.useTexture) {
      ctx.globalCompositeOperation = 'overlay';
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      for(let i=0; i<h; i+=4) {
          ctx.fillRect(0, i, w, 2);
      }
      ctx.globalCompositeOperation = 'source-over';
  }

  // 2. Header
  const headY = 100 + state.offsetTitle;
  
  // Header Accent Line
  ctx.fillStyle = state.accentColor;
  if(state.textGlow) {
      ctx.shadowColor = state.accentColor;
      ctx.shadowBlur = 15;
  }
  roundRect(ctx, 50, headY + 5, 12, 100, 6);
  ctx.shadowBlur = 0; // reset
  
  // Title Text Setup
  ctx.fillStyle = 'white';
  ctx.font = getFont(900, 80);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  
  // Apply Glow if enabled
  if (state.textGlow) {
      ctx.shadowColor = state.accentColor;
      ctx.shadowBlur = 25;
  }
  ctx.fillText(state.title.toUpperCase(), 85, headY);
  ctx.shadowBlur = 0; // reset
  
  ctx.fillStyle = '#cccccc';
  ctx.font = getFont(600, 35);
  ctx.fillText(state.subtitle.toUpperCase(), 85, headY + 85);

  // Custom Watermark (Top Right)
  if (state.assets.watermark) {
      const wm = state.assets.watermark;
      const maxW = 150;
      const maxH = 80;
      const ratio = Math.min(maxW / wm.width, maxH / wm.height);
      const drawW = wm.width * ratio;
      const drawH = wm.height * ratio;
      ctx.globalAlpha = 0.8;
      ctx.drawImage(wm, w - drawW - 50, 50, drawW, drawH);
      ctx.globalAlpha = 1.0;
  }

  // 3. Content Routing
  const contentY = headY + 180 + state.offsetContent;
  
  if(state.layout === 'list') drawList(w, h, contentY);
  else if(state.layout === 'gridMap') drawGridMap(w, h, contentY);
  else if(state.layout === 'podium') drawPodium(w, h, contentY);
  else if(state.layout === 'hero') drawHero(w, h, contentY);

  // FX: Rain Overlay (drawn on top of the drivers/UI)
  if(state.fxRain) drawRain(w, h);
}

/* --- GRID MAP VIEW --- */
function drawGridMap(w, h, startY) {
    const count = state.grid.length;
    const rows = Math.ceil(count / 2);
    const availH = h - startY - 40;
    let rowH = availH / rows;
    
    if(rowH > 120) rowH = 120;
    if(rowH < 60) rowH = 60; 
    
    const center = w / 2;
    const boxW = w * 0.38; 
    const gap = 15;
    
    // Draw Center Line 
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 4;
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(center, startY);
    ctx.lineTo(center, h);
    ctx.stroke();
    ctx.setLineDash([]); 
    
    state.grid.forEach((d, i) => {
        const isLeft = (i % 2 === 0); 
        const rowIdx = Math.floor(i / 2);
        
        const staggerOffset = isLeft ? 0 : (rowH * 0.4); 
        const y = startY + (rowIdx * rowH) + staggerOffset;
        const x = isLeft ? (center - boxW - gap) : (center + gap);
        
        // Draw Grid Slot Box
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 4;
        
        ctx.fillStyle = state.glassMode ? 'rgba(30,35,45,0.8)' : 'rgba(20,20,20,0.9)';
        roundRect(ctx, x, y, boxW, rowH - 12, 8);
        
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        
        // Border
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        if(ctx.roundRect) {
            ctx.strokeRect(x,y,boxW,rowH-12); 
        }
        
        // Team Color Strip
        ctx.fillStyle = d.color;
        if(isLeft) {
             roundRect(ctx, x, y, 8, rowH - 12, {tl: 8, bl: 8});
        } else {
             roundRect(ctx, x + boxW - 8, y, 8, rowH - 12, {tr: 8, br: 8});
        }
        
        // Text
        const cy = y + (rowH - 12)/2;
        
        ctx.fillStyle = 'white';
        ctx.font = getFont(900, rowH * 0.4);
        ctx.textBaseline = 'middle';
        ctx.textAlign = isLeft ? 'left' : 'right';
        const numX = isLeft ? x + 25 : x + boxW - 25;
        ctx.fillText(d.pos, numX, cy);
        
        ctx.font = getFont('bold', rowH * 0.28);
        const nameX = isLeft ? x + 75 : x + boxW - 75;
        ctx.fillText(d.name.toUpperCase(), nameX, cy - (rowH*0.1));
        
        ctx.fillStyle = '#aaa';
        ctx.font = getFont('normal', rowH * 0.18);
        ctx.fillText(d.team.toUpperCase(), nameX, cy + (rowH * 0.2));
    });
}

/* --- LIST VIEW --- */
function drawList(w, h, startY) {
  const count = state.grid.length;
  const useTwoCols = (state.autoCols && count > 10);
  const rowsPerCol = useTwoCols ? Math.ceil(count / 2) : count;
  const availH = h - startY - 40;
  let rowH = availH / rowsPerCol;
  
  if(rowH > 90) rowH = 90; 
  
  const colWidth = useTwoCols ? w / 2 : w;
  const posFontSize = useTwoCols ? 28 : 36;
  const nameFontSize = useTwoCols ? 22 : 28;
  const subFontSize = useTwoCols ? 16 : 22;
  const boxPadding = useTwoCols ? 15 : 25;

  state.grid.forEach((d, i) => {
    let colIndex = 0;
    let rowIndex = i;
    
    if(useTwoCols) {
        if(i >= rowsPerCol) {
            colIndex = 1;
            rowIndex = i - rowsPerCol;
        }
    }
    
    const xBase = colIndex * colWidth;
    const y = startY + (rowIndex * rowH);
    const cy = y + rowH/2;
    
    const stripW = colWidth - (boxPadding * 2);
    const stripX = xBase + boxPadding;
    
    // Box Background
    if(state.glassMode) {
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 4;
        roundRect(ctx, stripX, y+3, stripW, rowH-6, 8);
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
    } else if(i % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      roundRect(ctx, stripX, y+2, stripW, rowH-4, 6);
    }
    
    // Team Color Marker
    ctx.fillStyle = d.color;
    roundRect(ctx, stripX + 2, y + 8, 6, rowH - 16, 3);
    
    ctx.textBaseline = 'middle';
    
    // POS
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.font = getFont('bold', posFontSize);
    const posX = stripX + 40;
    ctx.fillText(d.pos, posX, cy);
    
    // NAME
    ctx.textAlign = 'left';
    ctx.font = getFont('bold', nameFontSize);
    const nameX = stripX + 75;
    ctx.fillText(d.name.toUpperCase(), nameX, cy);
    
    // Number tag
    const nameW = ctx.measureText(d.name.toUpperCase()).width;
    if(!useTwoCols || colWidth > 400) {
        ctx.fillStyle = state.accentColor;
        ctx.font = getFont('bold', subFontSize);
        ctx.fillText(`#${d.id}`, nameX + nameW + 12, cy);
    }
    
    // GAP 
    ctx.textAlign = 'right';
    ctx.fillStyle = '#aaa';
    ctx.font = getFont(600, subFontSize);
    ctx.fillText(d.gap, stripX + stripW - 15, cy);
  });
}

/* --- PODIUM VIEW --- */
function drawPodium(w, h, startY) {
  const centerX = w / 2;
  
  const drawSlot = (driver, rank, x, imgAsset) => {
    const yBase = startY + 450;
    const height = rank === 1 ? 300 : rank === 2 ? 220 : 180;
    const yTop = yBase - height;
    const boxW = 260;
    
    // 1. Draw Image
    if(imgAsset) {
      const zoom = state.podiumScale / 100;
      const aspect = imgAsset.width / imgAsset.height;
      
      const drawH = 450 * zoom;
      const drawW = drawH * aspect;
      
      const imgX = x - drawW/2;
      const imgY = yTop - drawH + 70 + state.podiumOffsetY;

      ctx.save();
      
      if(state.podiumClip) {
          ctx.beginPath();
          ctx.rect(x - boxW/2, 0, boxW, yTop + 20); 
          ctx.clip();
      }
      
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 25;
      ctx.drawImage(imgAsset, imgX, imgY, drawW, drawH);
      ctx.restore();
    }

    // 2. The Podium Box
    ctx.fillStyle = state.glassMode ? 'rgba(30,35,45,0.9)' : 'rgba(25,25,25,0.95)';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = -5;
    
    // Base Box
    ctx.beginPath();
    ctx.moveTo(x - boxW/2, yTop);
    ctx.lineTo(x + boxW/2, yTop);
    ctx.lineTo(x + boxW/2, yBase);
    ctx.lineTo(x - boxW/2, yBase);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Top Edge Accent
    ctx.fillStyle = driver.color;
    ctx.fillRect(x - boxW/2, yTop, boxW, 8);
    
    // Rank Number
    ctx.fillStyle = driver.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = getFont(900, 110);
    ctx.globalAlpha = 0.8;
    ctx.fillText(rank, x, yTop + height/2 + 10);
    ctx.globalAlpha = 1.0;
    
    // Driver Name Tag Background
    ctx.fillStyle = 'black';
    roundRect(ctx, x - 100, yTop - 25, 200, 50, 25);
    ctx.strokeStyle = driver.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Driver Name Tag Text
    ctx.fillStyle = 'white';
    ctx.font = getFont('bold', 22);
    ctx.fillText(driver.name.split(" ")[1].toUpperCase(), x, yTop);
  };

  // Draw Order: 2, 3, 1 
  if(state.grid[1]) drawSlot(state.grid[1], 2, centerX - 280, state.assets.p2);
  if(state.grid[2]) drawSlot(state.grid[2], 3, centerX + 280, state.assets.p3);
  if(state.grid[0]) drawSlot(state.grid[0], 1, centerX, state.assets.p1);
  
  // Remaining List 
  const listStart = startY + 500;
  const remH = (h - listStart) / 6;
  const maxList = Math.min(state.grid.length, 9); 

  for(let i=3; i<maxList; i++) {
     const d = state.grid[i];
     const y = listStart + ((i-3) * remH);
     
     ctx.fillStyle = state.glassMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.4)';
     roundRect(ctx, 50, y+4, w-100, remH-8, 8);
     ctx.fillStyle = d.color;
     roundRect(ctx, 50, y+4, 8, remH-8, {tl: 8, bl: 8});
     
     ctx.fillStyle = 'white';
     ctx.textAlign = 'left';
     ctx.textBaseline = 'middle';
     ctx.font = getFont('bold', 24);
     ctx.fillText(`P${d.pos}`, 75, y + remH/2);
     ctx.fillText(`${d.name.toUpperCase()}`, 130, y + remH/2);
     
     ctx.textAlign = 'right';
     ctx.fillStyle = '#ccc';
     ctx.font = getFont('normal', 22);
     ctx.fillText(d.gap, w-70, y + remH/2);
  }
}

/* --- HERO VIEW --- */
function drawHero(w, h, startY) {
  const d = state.heroDriver;
  
  // Big Background Text
  ctx.save();
  ctx.translate(w/2, h/2);
  ctx.rotate(-Math.PI / 10);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.font = getFont(900, 350);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(d.id, 0, 0);
  ctx.restore();
  
  // Hero Image
  if(state.assets.p1) {
      const img = state.assets.p1;
      const aspect = img.width / img.height;
      const tH = h * 0.75; 
      const tW = tH * aspect;
      
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 60;
      ctx.drawImage(img, (w-tW)/2, h - tH, tW, tH);
      ctx.shadowBlur = 0;
  }
  
  // Overlay Text Base
  const textY = h/2 + 120;
  
  // Back glow
  ctx.shadowColor = d.color;
  ctx.shadowBlur = 40;
  ctx.textAlign = 'center';
  ctx.fillStyle = state.accentColor;
  ctx.font = getFont(900, 130);
  ctx.fillText(state.heroText.toUpperCase(), w/2, textY);
  ctx.shadowBlur = 0;
  
  // Front Text Outline for pop
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 8;
  ctx.strokeText(state.heroText.toUpperCase(), w/2, textY);
  ctx.fillText(state.heroText.toUpperCase(), w/2, textY);
  
  // Driver Name Box
  ctx.font = getFont('bold', 55);
  const nameW = ctx.measureText(d.name.toUpperCase()).width + 60;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  roundRect(ctx, (w-nameW)/2, textY + 40, nameW, 80, 10);
  
  ctx.fillStyle = 'white';
  ctx.textBaseline = 'middle';
  ctx.fillText(d.name.toUpperCase(), w/2, textY + 80);
  
  // Team Bottom Strip
  ctx.fillStyle = d.color;
  ctx.fillRect(0, h-25, w, 25);
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `f1_graphic_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png', 1.0);
  link.click();
}

init();

</script>
